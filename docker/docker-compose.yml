# gaston_rag — docker-compose.yml
# Comandos desde la raíz:
#   Subir:  docker compose -f docker/docker-compose.yml up -d
#   Bajar:  docker compose -f docker/docker-compose.yml down
#   Datos:  docker compose -f docker/docker-compose.yml down -v  ← cuidado

services:

  # ─────────────────────────────────────────
  # ChromaDB — base de datos vectorial
  # ─────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: gaston-rag-chroma
    restart: always
    expose:
      - "8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - gaston-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Ollama — embeddings + LLM local
  # Usa GPU automáticamente si está disponible
  # Si no hay GPU, Docker ignora el bloque deploy
  # y Ollama cae a CPU sin cambiar nada del código
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.8
    container_name: gaston-rag-ollama
    restart: always
    expose:
      - "11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - gaston-rag-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all          # todas las GPUs disponibles
              capabilities: [gpu] # si no hay GPU, se ignora → CPU

  # ─────────────────────────────────────────
  # Ollama setup — descarga modelos al primer arranque
  # Modelos: nomic-embed-text (embeddings) + phi3:mini (LLM)
  # Los modelos persisten en el volumen ollama_models —
  # solo se descargan una vez, no en cada docker compose up
  # ─────────────────────────────────────────
  ollama-setup:
    image: ollama/ollama:0.6.8
    container_name: gaston-rag-ollama-setup
    restart: "no"
    entrypoint: >
      sh -c "
        until ollama list > /dev/null 2>&1; do
          echo 'Esperando Ollama...' && sleep 3;
        done &&
        ollama pull nomic-embed-text &&
        ollama pull phi3:mini &&
        echo 'Modelos listos'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - gaston-rag-network

  # ─────────────────────────────────────────
  # API — FastAPI + LangChain
  # Volumen de código montado — cambios en local
  # se reflejan sin rebuild
  # ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gaston-rag-api
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - ../.env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
    volumes:
      - ../app:/app/app
      - ../scripts:/app/scripts
      - ../connectors:/app/connectors
      - ../data:/app/data
    depends_on:
      chroma:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    networks:
      - gaston-rag-network

volumes:
  chroma_data:
  ollama_models:

networks:
  gaston-rag-network:
    driver: bridge